<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="100%" role="img" aria-labelledby="pipeTitle pipeDesc">
  <title id="pipeTitle">数据流水线 - 从 MNIST 加载到测试评估</title>
  <desc id="pipeDesc">横向五节点流水线:加载 MNIST(60000+10000)、预处理(归一化 /255)、切分验证集、批训练(batch 128 / 10 epoch)、测试集评估。</desc>

  <defs>
    <style>
      .sans { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; }
    </style>
  </defs>

  <!-- 暖白背景 -->
  <rect x="0" y="0" width="1200" height="320" rx="16" fill="#FAFAF7" stroke="#E8E4D9" stroke-width="1"/>

  <!-- 标题 -->
  <text x="56" y="40" class="sans" font-size="20" font-weight="700" fill="#1A1A1A">数据流水线 · 从 MNIST 到评估</text>
  <text x="56" y="60" class="mono" font-size="11" fill="#8B8680">加载 → 归一化 → 切分 → 批训练 → 评估</text>

  <!-- 节点间箭头(在节点下方,y=170) -->
  <g stroke="#8B8680" stroke-width="1" fill="#8B8680">
    <path d="M 250,170 L 290,170" stroke="#8B8680" fill="none"/>
    <path d="M 286,166 L 290,170 L 286,174 Z"/>
    <path d="M 470,170 L 510,170" stroke="#8B8680" fill="none"/>
    <path d="M 506,166 L 510,170 L 506,174 Z"/>
    <path d="M 690,170 L 730,170" stroke="#8B8680" fill="none"/>
    <path d="M 726,166 L 730,170 L 726,174 Z"/>
    <path d="M 910,170 L 950,170" stroke="#8B8680" fill="none"/>
    <path d="M 946,166 L 950,170 L 946,174 Z"/>
  </g>

  <!-- 节点 1: 加载 MNIST (中心 160) -->
  <g>
    <rect x="70" y="90" width="180" height="160" rx="10" fill="#FFFFFF" stroke="#E8E4D9" stroke-width="1"/>
    <!-- motif: 5x4 像素网格代表手写数字 -->
    <g transform="translate(125, 108)" fill="#1A1A1A">
      <rect x="0" y="0" width="10" height="10"/>
      <rect x="12" y="0" width="10" height="10"/>
      <rect x="24" y="0" width="10" height="10"/>
      <rect x="48" y="0" width="10" height="10"/>
      <rect x="12" y="12" width="10" height="10"/>
      <rect x="36" y="12" width="10" height="10"/>
      <rect x="48" y="12" width="10" height="10"/>
      <rect x="24" y="24" width="10" height="10"/>
      <rect x="36" y="24" width="10" height="10"/>
      <rect x="48" y="24" width="10" height="10"/>
      <rect x="36" y="36" width="10" height="10"/>
      <rect x="48" y="36" width="10" height="10"/>
    </g>
    <text x="160" y="180" class="sans" font-size="14" font-weight="700" fill="#1A1A1A" text-anchor="middle">加载 MNIST</text>
    <text x="160" y="200" class="mono" font-size="11" fill="#8B8680" text-anchor="middle">Keras 内置数据集</text>
    <text x="160" y="222" class="mono" font-size="12" fill="#C44536" font-weight="700" text-anchor="middle">60,000 + 10,000</text>
    <text x="160" y="238" class="mono" font-size="10" fill="#8B8680" text-anchor="middle">28×28 灰度图</text>
  </g>

  <!-- 节点 2: 预处理 (中心 380) -->
  <g>
    <rect x="290" y="90" width="180" height="160" rx="10" fill="#FFFFFF" stroke="#E8E4D9" stroke-width="1"/>
    <!-- motif: 数值变换 0-255 → 0-1 -->
    <g transform="translate(320, 128)">
      <text x="0" y="0" class="mono" font-size="13" fill="#8B8680">[0, 255]</text>
      <path d="M 60,-4 L 84,-4" stroke="#8B8680" stroke-width="1"/>
      <path d="M 80,-8 L 84,-4 L 80,0 Z" fill="#8B8680"/>
      <text x="92" y="0" class="mono" font-size="13" font-weight="700" fill="#C44536">[0, 1]</text>
    </g>
    <text x="380" y="180" class="sans" font-size="14" font-weight="700" fill="#1A1A1A" text-anchor="middle">预处理</text>
    <text x="380" y="200" class="mono" font-size="11" fill="#8B8680" text-anchor="middle">归一化 x / 255.0</text>
    <text x="380" y="222" class="mono" font-size="12" fill="#1A1A1A" text-anchor="middle">float32 · reshape</text>
    <text x="380" y="238" class="mono" font-size="10" fill="#8B8680" text-anchor="middle">展平为 784 维向量</text>
  </g>

  <!-- 节点 3: 切分验证 (中心 600) -->
  <g>
    <rect x="510" y="90" width="180" height="160" rx="10" fill="#FFFFFF" stroke="#E8E4D9" stroke-width="1"/>
    <!-- motif: 大方块分成两块(训练/验证) -->
    <g transform="translate(545, 112)">
      <rect x="0" y="0" width="100" height="24" rx="3" fill="#C44536"/>
      <text x="50" y="16" class="mono" font-size="10" fill="#FFFFFF" text-anchor="middle">train 80%</text>
      <rect x="0" y="28" width="100" height="10" rx="3" fill="#2E5C8A"/>
      <text x="50" y="36" class="mono" font-size="8" fill="#FFFFFF" text-anchor="middle">val 20%</text>
    </g>
    <text x="600" y="180" class="sans" font-size="14" font-weight="700" fill="#1A1A1A" text-anchor="middle">切分验证</text>
    <text x="600" y="200" class="mono" font-size="11" fill="#8B8680" text-anchor="middle">训练集内切分监控</text>
    <text x="600" y="222" class="mono" font-size="12" fill="#1A1A1A" text-anchor="middle">validation_split</text>
    <text x="600" y="238" class="mono" font-size="10" fill="#8B8680" text-anchor="middle">防止过拟合</text>
  </g>

  <!-- 节点 4: 批训练 (中心 820) -->
  <g>
    <rect x="730" y="90" width="180" height="160" rx="10" fill="#FFFFFF" stroke="#E8E4D9" stroke-width="1"/>
    <!-- motif: 4x4 小方块代表 batch -->
    <g transform="translate(780, 108)" fill="#C44536">
      <rect x="0" y="0" width="8" height="8" rx="1"/>
      <rect x="10" y="0" width="8" height="8" rx="1"/>
      <rect x="20" y="0" width="8" height="8" rx="1"/>
      <rect x="30" y="0" width="8" height="8" rx="1"/>
      <rect x="0" y="10" width="8" height="8" rx="1"/>
      <rect x="10" y="10" width="8" height="8" rx="1"/>
      <rect x="20" y="10" width="8" height="8" rx="1"/>
      <rect x="30" y="10" width="8" height="8" rx="1"/>
      <rect x="0" y="20" width="8" height="8" rx="1"/>
      <rect x="10" y="20" width="8" height="8" rx="1"/>
      <rect x="20" y="20" width="8" height="8" rx="1"/>
      <rect x="30" y="20" width="8" height="8" rx="1"/>
      <rect x="0" y="30" width="8" height="8" rx="1"/>
      <rect x="10" y="30" width="8" height="8" rx="1"/>
      <rect x="20" y="30" width="8" height="8" rx="1"/>
      <rect x="30" y="30" width="8" height="8" rx="1"/>
    </g>
    <text x="820" y="180" class="sans" font-size="14" font-weight="700" fill="#1A1A1A" text-anchor="middle">批训练</text>
    <text x="820" y="200" class="mono" font-size="11" fill="#8B8680" text-anchor="middle">Adam · 反向传播</text>
    <text x="820" y="222" class="mono" font-size="12" fill="#C44536" font-weight="700" text-anchor="middle">batch 128 · 10 epoch</text>
    <text x="820" y="238" class="mono" font-size="10" fill="#8B8680" text-anchor="middle">W ← W − lr · ∇W</text>
  </g>

  <!-- 节点 5: 评估 (中心 1040) -->
  <g>
    <rect x="950" y="90" width="180" height="160" rx="10" fill="#FFFFFF" stroke="#E8E4D9" stroke-width="1"/>
    <!-- motif: 进度条 98% -->
    <g transform="translate(980, 118)">
      <rect x="0" y="0" width="120" height="14" rx="7" fill="#E8E4D9"/>
      <rect x="0" y="0" width="118" height="14" rx="7" fill="#2E5C8A"/>
      <text x="60" y="11" class="mono" font-size="9" fill="#FFFFFF" text-anchor="middle" font-weight="700">0.982</text>
    </g>
    <text x="1040" y="180" class="sans" font-size="14" font-weight="700" fill="#1A1A1A" text-anchor="middle">测试评估</text>
    <text x="1040" y="200" class="mono" font-size="11" fill="#8B8680" text-anchor="middle">测试集 10,000 样本</text>
    <text x="1040" y="222" class="mono" font-size="12" fill="#2E5C8A" font-weight="700" text-anchor="middle">test acc ~0.98</text>
    <text x="1040" y="238" class="mono" font-size="10" fill="#8B8680" text-anchor="middle">model.evaluate()</text>
  </g>

  <!-- 底部说明 -->
  <text x="600" y="290" class="mono" font-size="10" fill="#8B8680" text-anchor="middle">Keras 内置 MNIST · 首次运行自动下载约 11 MB · 存放于 ~/.keras/datasets/</text>
</svg>
