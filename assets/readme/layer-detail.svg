<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" width="100%" role="img" aria-labelledby="layerTitle layerDesc">
  <title id="layerTitle">层细节 - 三层全连接参数量分布</title>
  <desc id="layerDesc">三列卡片展示 Dense 256、Dense 128、Dense 10 的输入输出维度、激活函数、参数量与计算公式,底部汇总总参数 235,146。</desc>

  <defs>
    <style>
      .sans { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; }
    </style>
  </defs>

  <!-- 暖白背景 -->
  <rect x="0" y="0" width="1200" height="280" rx="16" fill="#FAFAF7" stroke="#E8E4D9" stroke-width="1"/>

  <!-- 标题 -->
  <text x="56" y="40" class="sans" font-size="20" font-weight="700" fill="#1A1A1A">层细节 · 参数量分布</text>
  <text x="56" y="60" class="mono" font-size="11" fill="#8B8680">三层全连接 · params = in × out + out(偏置)</text>

  <!-- 卡片 1: Dense 256 -->
  <g>
    <rect x="56" y="80" width="340" height="160" rx="10" fill="#FFFFFF" stroke="#E8E4D9" stroke-width="1"/>
    <rect x="58" y="82" width="4" height="156" rx="2" fill="#C44536"/>
    <text x="76" y="106" class="mono" font-size="11" fill="#8B8680" letter-spacing="1">DENSE · HIDDEN 1</text>
    <text x="76" y="134" class="sans" font-size="24" font-weight="700" fill="#1A1A1A">784 → 256</text>
    <text x="76" y="158" class="mono" font-size="12" fill="#5A5550">激活 ReLU · Dropout 0.2</text>
    <line x1="76" y1="172" x2="376" y2="172" stroke="#E8E4D9" stroke-width="1"/>
    <text x="76" y="194" class="mono" font-size="11" fill="#8B8680">公式  784 × 256 + 256</text>
    <text x="76" y="220" class="mono" font-size="11" fill="#8B8680">参数量</text>
    <text x="200" y="222" class="sans" font-size="18" font-weight="700" fill="#C44536">200,960</text>
  </g>

  <!-- 卡片 2: Dense 128 -->
  <g>
    <rect x="430" y="80" width="340" height="160" rx="10" fill="#FFFFFF" stroke="#E8E4D9" stroke-width="1"/>
    <rect x="432" y="82" width="4" height="156" rx="2" fill="#C44536"/>
    <text x="450" y="106" class="mono" font-size="11" fill="#8B8680" letter-spacing="1">DENSE · HIDDEN 2</text>
    <text x="450" y="134" class="sans" font-size="24" font-weight="700" fill="#1A1A1A">256 → 128</text>
    <text x="450" y="158" class="mono" font-size="12" fill="#5A5550">激活 ReLU · Dropout 0.2</text>
    <line x1="450" y1="172" x2="750" y2="172" stroke="#E8E4D9" stroke-width="1"/>
    <text x="450" y="194" class="mono" font-size="11" fill="#8B8680">公式  256 × 128 + 128</text>
    <text x="450" y="220" class="mono" font-size="11" fill="#8B8680">参数量</text>
    <text x="574" y="222" class="sans" font-size="18" font-weight="700" fill="#C44536">32,896</text>
  </g>

  <!-- 卡片 3: Dense 10 -->
  <g>
    <rect x="804" y="80" width="340" height="160" rx="10" fill="#FFFFFF" stroke="#E8E4D9" stroke-width="1"/>
    <rect x="806" y="82" width="4" height="156" rx="2" fill="#2E5C8A"/>
    <text x="824" y="106" class="mono" font-size="11" fill="#8B8680" letter-spacing="1">DENSE · OUTPUT</text>
    <text x="824" y="134" class="sans" font-size="24" font-weight="700" fill="#1A1A1A">128 → 10</text>
    <text x="824" y="158" class="mono" font-size="12" fill="#5A5550">激活 Softmax · 10 类概率</text>
    <line x1="824" y1="172" x2="1124" y2="172" stroke="#E8E4D9" stroke-width="1"/>
    <text x="824" y="194" class="mono" font-size="11" fill="#8B8680">公式  128 × 10 + 10</text>
    <text x="824" y="220" class="mono" font-size="11" fill="#8B8680">参数量</text>
    <text x="948" y="222" class="sans" font-size="18" font-weight="700" fill="#2E5C8A">1,290</text>
  </g>

  <!-- 底部汇总 -->
  <text x="600" y="266" class="mono" font-size="12" fill="#1A1A1A" text-anchor="middle">总参数量  <tspan font-weight="700" fill="#1A1A1A">235,146</tspan>  ·  全连接结构  ·  无卷积/池化层</text>
</svg>
