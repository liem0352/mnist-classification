<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 380" width="100%" role="img" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">MNIST 手写数字分类 — Keras 神经网络与损失函数对比</title>
  <desc id="heroDesc">研究型 hero：左侧标题块（MNIST 手写数字分类），右侧网络层栈示意图（784 输入 → 256 ReLU → 128 ReLU → 10 Softmax）。</desc>

  <defs>
    <style>
      .sans { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; }
    </style>
  </defs>

  <!-- 暖白纸面背景 -->
  <rect x="0" y="0" width="1200" height="380" rx="26" fill="#FAFAF7"/>

  <!-- 左侧：标题块 -->
  <g transform="translate(56, 40)">
    <text x="0" y="34" class="mono" font-size="14" fill="#8B8680" letter-spacing="2">DEEP LEARNING · MNIST</text>
    <text x="0" y="92" class="sans" font-size="44" font-weight="700" fill="#1A1A1A">MNIST 手写数字分类</text>
    <text x="0" y="128" class="sans" font-size="18" fill="#8B8680">Keras 神经网络 · 反向传播 · 交叉熵 vs 均方误差</text>
    <text x="0" y="166" class="mono" font-size="14" fill="#8B8680">784 → 256 → 128 → 10 · Adam · batch 128 · 10 epoch</text>
  </g>

  <!-- 右侧：网络层栈 motif -->
  <g transform="translate(760, 50)">
    <!-- Layer 1: INPUT 784 -->
    <g>
      <rect x="0" y="0" width="320" height="48" rx="8" fill="#E8E4D9" stroke="#8B8680" stroke-width="1"/>
      <text x="20" y="22" class="mono" font-size="14" font-weight="600" fill="#1A1A1A">INPUT · 784</text>
      <text x="20" y="40" class="mono" font-size="12" fill="#8B8680">28×28 展平</text>
    </g>
    <!-- arrow 1 -->
    <path d="M 160,48 L 160,56" stroke="#8B8680" stroke-width="1"/>
    <path d="M 156,56 L 160,60 L 164,56 Z" fill="#8B8680"/>

    <!-- Layer 2: HIDDEN 256 (砖红左标识 = 主任务) -->
    <g transform="translate(0, 60)">
      <rect x="0" y="0" width="320" height="48" rx="8" fill="#FFFFFF" stroke="#1A1A1A" stroke-width="1"/>
      <rect x="2" y="2" width="4" height="44" rx="2" fill="#C44536"/>
      <text x="20" y="22" class="mono" font-size="14" font-weight="600" fill="#1A1A1A">HIDDEN · 256</text>
      <text x="20" y="40" class="mono" font-size="12" fill="#8B8680">ReLU · Dropout 0.2</text>
    </g>
    <!-- arrow 2 -->
    <path d="M 160,108 L 160,116" stroke="#8B8680" stroke-width="1"/>
    <path d="M 156,116 L 160,120 L 164,116 Z" fill="#8B8680"/>

    <!-- Layer 3: HIDDEN 128 -->
    <g transform="translate(0, 120)">
      <rect x="0" y="0" width="320" height="48" rx="8" fill="#FFFFFF" stroke="#1A1A1A" stroke-width="1"/>
      <rect x="2" y="2" width="4" height="44" rx="2" fill="#C44536"/>
      <text x="20" y="22" class="mono" font-size="14" font-weight="600" fill="#1A1A1A">HIDDEN · 128</text>
      <text x="20" y="40" class="mono" font-size="12" fill="#8B8680">ReLU · Dropout 0.2</text>
    </g>
    <!-- arrow 3 -->
    <path d="M 160,168 L 160,176" stroke="#8B8680" stroke-width="1"/>
    <path d="M 156,176 L 160,180 L 164,176 Z" fill="#8B8680"/>

    <!-- Layer 4: OUTPUT 10 (深蓝 = MSE 对比锚点) -->
    <g transform="translate(0, 180)">
      <rect x="0" y="0" width="320" height="48" rx="8" fill="#2E5C8A" stroke="#2E5C8A" stroke-width="1"/>
      <text x="20" y="22" class="mono" font-size="14" font-weight="600" fill="#FFFFFF">OUTPUT · 10</text>
      <text x="20" y="40" class="mono" font-size="12" fill="#E8E4D9">Softmax</text>
    </g>
  </g>

  <!-- 底部署名 -->
  <text x="56" y="358" class="mono" font-size="12" fill="#8B8680">TensorFlow 2.x · Keras · 作者 liem · 广东工商职业技术大学</text>
</svg>
