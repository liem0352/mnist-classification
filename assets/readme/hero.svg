<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="340" viewBox="0 0 1200 340" role="img" aria-labelledby="t d">
  <title id="t">mnist-classification · MNIST 手写数字分类</title>
  <desc id="d">基于 Keras/TensorFlow 的神经网络后向传播实现,对比交叉熵与均方误差损失。左侧标题与技术栈,右侧展示多层神经网络结构与损失对比。</desc>
  <rect width="1200" height="340" rx="22" fill="#0c1018"/>
  <rect x="0" y="0" width="6" height="340" rx="3" fill="#818cf8"/>

  <g transform="translate(56,54)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC',sans-serif">
    <text x="0" y="0" font-size="15" letter-spacing="4" fill="#818cf8" font-weight="600">DEEP LEARNING · MNIST</text>
    <text x="0" y="52" font-size="40" font-weight="700" fill="#e2e8f0">MNIST 手写数字分类</text>
    <text x="0" y="96" font-size="17" fill="#7d899c">Keras 神经网络后向传播实现</text>
    <text x="0" y="122" font-size="17" fill="#7d899c">交叉熵 vs 均方误差损失对比</text>

    <g transform="translate(0,160)" font-size="13.5" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">
      <g><rect width="92" height="30" rx="8" fill="none" stroke="#1e2436"/><text x="46" y="20" text-anchor="middle" fill="#9fb0c8">TensorFlow</text></g>
      <g transform="translate(104,0)"><rect width="76" height="30" rx="8" fill="none" stroke="#1e2436"/><text x="38" y="20" text-anchor="middle" fill="#9fb0c8">Keras</text></g>
      <g transform="translate(192,0)"><rect width="72" height="30" rx="8" fill="none" stroke="#1e2436"/><text x="36" y="20" text-anchor="middle" fill="#9fb0c8">NumPy</text></g>
      <g transform="translate(276,0)"><rect width="100" height="30" rx="8" fill="none" stroke="#1e2436"/><text x="50" y="20" text-anchor="middle" fill="#9fb0c8">Matplotlib</text></g>
      <g transform="translate(388,0)"><rect width="88" height="30" rx="8" fill="none" stroke="#3a2a4a"/><text x="44" y="20" text-anchor="middle" fill="#818cf8">Softmax</text></g>
    </g>
    <text x="0" y="236" font-size="13" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" fill="#4d5868">Adam · batch_size=128 · Dropout 0.2 · 10 epochs</text>
  </g>

