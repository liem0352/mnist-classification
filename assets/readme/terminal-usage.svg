<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 200" width="100%" role="img" aria-labelledby="termTitle termDesc">
  <title id="termTitle">快速开始 - 三条命令</title>
  <desc id="termDesc">终端窗口样式卡片,展示安装依赖、一键运行、单独运行任务一三条命令。</desc>

  <defs>
    <style>
      .sans { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; }
    </style>
  </defs>

  <!-- 暖白背景 -->
  <rect x="0" y="0" width="1200" height="200" rx="16" fill="#FAFAF7" stroke="#E8E4D9" stroke-width="1"/>

  <!-- 标题 -->
  <text x="56" y="38" class="sans" font-size="18" font-weight="700" fill="#1A1A1A">快速开始</text>
  <text x="56" y="56" class="mono" font-size="11" fill="#8B8680">安装 · 一键运行 · 单独运行</text>

  <!-- 终端窗口 -->
  <rect x="56" y="72" width="1088" height="112" rx="8" fill="#1A1A1A"/>
  <!-- 标题栏 -->
  <rect x="56" y="72" width="1088" height="24" rx="8" fill="#2A2A2A"/>
  <rect x="56" y="88" width="1088" height="8" fill="#2A2A2A"/>
  <!-- 三个圆点(项目色) -->
  <circle cx="76" cy="84" r="4" fill="#C44536"/>
  <circle cx="90" cy="84" r="4" fill="#E8E4D9"/>
  <circle cx="104" cy="84" r="4" fill="#2E5C8A"/>
  <text x="600" y="88" class="mono" font-size="10" fill="#8B8680" text-anchor="middle">bash · mnist-classification</text>

  <!-- 命令行 -->
  <g class="mono" font-size="13" fill="#E8E4D9">
    <text x="76" y="120"><tspan fill="#C44536">$</tspan> pip install tensorflow numpy matplotlib</text>
    <text x="76" y="144"><tspan fill="#C44536">$</tspan> python run_all.py</text>
    <text x="76" y="168"><tspan fill="#C44536">$</tspan> python task1_mnist_keras.py  <tspan fill="#8B8680"># 仅任务一:手写数字分类</tspan></text>
  </g>
</svg>
